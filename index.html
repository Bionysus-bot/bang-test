    // 渲染题目 (18题)
    function renderQuestions() {
        const container = document.getElementById("questionsArea");
        let html = '';
        questions.forEach((q, idx) => {
            html += `<div class="question-card" data-qidx="${idx}">
                        <div class="q-title"><span class="q-num">${idx+1}</span> ${q.text}</div>
                        <div class="options" id="q-${idx}">`;
            q.options.forEach((opt, optIdx) => {
                const letter = String.fromCharCode(65+optIdx);
                html += `<label class="opt-label">
                            <input type="radio" name="q${idx}" value="${optIdx}" data-val='${JSON.stringify(opt.val)}'>
                            <span class="opt-text">${letter}. ${opt.text}</span>
                         </label>`;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html;
    }

    // 收集维度（MBTI四维度倾向）
    function collectUserDims() {
        let userVec = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
        let answered = true;
        for(let i=0;i<questions.length;i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if(!selected) { answered = false; continue; }
            const delta = JSON.parse(selected.getAttribute('data-val'));
            for(let k in delta) { if(userVec[k] !== undefined) userVec[k] += delta[k]; }
        }
        // 计算MBTI字母: E/I, S/N, T/F, J/P
        const mbti = (userVec.E >= userVec.I ? "E" : "I") + 
                     (userVec.N >= userVec.S ? "N" : "S") +
                     (userVec.F >= userVec.T ? "F" : "T") +
                     (userVec.P >= userVec.J ? "P" : "J");
        return { userVec, mbti, answered };
    }

    // 匹配最佳角色 (余弦相似+MBTI倾向权重)
    function findBestMatch(userVec, mbtiStr) {
        let best = null, bestSim = -Infinity;
        for(let ch of characters) {
            let chVec = ch.dim;
            let dot = 0, normU=0, normC=0;
            const keys = ['E','I','S','N','T','F','J','P'];
            for(let k of keys) {
                let uVal = (k==='E'?userVec.E: (k==='I'?userVec.I : (k==='S'?userVec.S: (k==='N'?userVec.N: (k==='T'?userVec.T: (k==='F'?userVec.F: (k==='J'?userVec.J: userVec.P)))))));
                let cVal = chVec[k];
                dot += uVal * cVal;
                normU += uVal*uVal;
                normC += cVal*cVal;
            }
            let sim = dot / (Math.sqrt(normU)*Math.sqrt(normC) + 1e-6);
            // MBTI字母加成: 相同字母越多越加分
            let chMbti = ch.mbti;
            let matchBonus = 0;
            for(let i=0;i<4;i++) if(mbtiStr[i]===chMbti[i]) matchBonus+=0.08;
            sim += matchBonus;
            if(sim > bestSim) { bestSim = sim; best = ch; }
        }
        let percent = Math.min(99, Math.floor((bestSim+0.5)*70 + 20));
        return { character: best, similarity: percent };
    }

    function starRating(percent) {
        let filled = Math.round(percent / 10);
        let stars = '';
        for(let i=0;i<10;i++) stars += `<i class="fas fa-star ${i<filled ? 'star-filled' : 'star-empty'}"></i>`;
        return `<div class="star-rating">${stars}</div><div style="text-align:center; font-size:0.7rem;">共鸣度 ${percent}%</div>`;
    }

    function showResult() {
        const { userVec, mbti, answered } = collectUserDims();
        if(!answered) {
            const resultDiv = document.getElementById("resultArea");
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `<div class="result-container"><div class="error-msg"><i class="fas fa-exclamation-circle"></i> 还有题目没答完哦~ 全部星星填满才能召唤邦邦分身！</div><button class="reset-btn" id="closeErrorBtn">继续演奏</button></div>`;
            document.getElementById("closeErrorBtn")?.addEventListener("click",()=>{ resultDiv.style.display="none"; });
            return;
        }
        const { character, similarity } = findBestMatch(userVec, mbti);
        const starHtml = starRating(similarity);
        const resultHtml = `
            <div class="result-container">
                <div class="char-name">⭐ ${character.name} ⭐</div>
                <div class="band-name">🎸 ${character.band}  ·  ${character.mbti}</div>
                ${starHtml}
                <div class="personality-desc">
                    <i class="fas fa-quote-left" style="margin-right:6px; opacity:0.7;"></i> ${character.desc}<br/>
                    <span class="mbti-badge"><i class="fas fa-chart-line"></i> 性格特质：${character.mbti} · 内在频率与你共振</span>
                </div>
                <button class="reset-btn" id="retakeBtn"><i class="fas fa-redo-alt"></i> 再次测试</button>
            </div>
        `;
        const resultArea = document.getElementById("resultArea");
        resultArea.style.display = "block";
        resultArea.innerHTML = resultHtml;
        document.getElementById("retakeBtn")?.addEventListener("click",()=>{
            document.querySelectorAll('input[type="radio"]').forEach(r=>r.checked=false);
            resultArea.style.display="none";
            window.scrollTo({top: document.getElementById("quizPanel").offsetTop-20, behavior:'smooth'});
        });
        resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    renderQuestions();
    document.getElementById("submitBtn").addEventListener("click", showResult);
